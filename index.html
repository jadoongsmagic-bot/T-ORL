<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-ORL - Top Online Research Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="intro-screen">
        <h1 class="intro-title">T-ORL</h1>
        <p class="intro-subtitle">Top Online Research Library</p>
        <button class="start-rect-btn" onclick="enterMainApp()">연구실 입장하기</button>
    </div>

    <div class="app-container">
        
        <aside class="sidebar">
            <div>
                <h2>학문 카테고리</h2>
                <button class="subject-btn active" onclick="changeCategory('수학'); this.classList.add('active');">수학</button>
                <button class="subject-btn" onclick="changeCategory('과학'); this.classList.add('active');">과학</button>
            </div>
            <div>
                <button class="subject-btn">보관함</button>
                <button class="subject-btn">돌아가기</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1 class="logo-main">T-ORL</h1>
                <p class="logo-sub">Top Online Research Library</p>
            </header>

            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="검색어를 입력하면 관련 제목을 가진 글을 보여줍니다">
            </div>

            <section id="results-area">
                </section>
        </main>
    </div>

    <div class="fab-group">
        <button class="write-fab" onclick="openStep1()">✏️</button>
    </div>

    <div id="modal-step1" class="modal">
        <div class="modal-content">
            <span class="close-mini" onclick="closeSpecificModal('modal-step1')">&times;</span>
            <h3>과목을 선택하세요</h3>
            <div style="text-align: center; margin-top: 20px;">
                <button onclick="openStep2('수학')">수학</button>
                <button onclick="openStep2('과학')">과학</button>
            </div>
        </div>
    </div>

    <div id="modal-step2" class="modal">
        <div class="modal-content">
            <span class="close-mini" onclick="closeSpecificModal('modal-step2')">&times;</span>
            <h3>연구 기록하기</h3>
            <input type="text" placeholder="작성자 이름을 입력하세요">
            <input type="text" placeholder="글 제목을 입력하세요">
            <textarea rows="6" placeholder="연구 내용을 상세히 적어주세요..."></textarea>
            <div style="text-align: right; margin-top: 15px;">
                <button class="start-rect-btn" style="padding: 8px 20px; font-size: 0.95rem;" onclick="savePostData()">업로드</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
